version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s - [%(levelname)s] - %(name)s - %(message)s - user_id: %(user_id)s"
    defaults:
      user_id: "-"

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: default
  file:
    class: logging.handlers.TimedRotatingFileHandler
    encoding: utf-8
    formatter: default
    filename: logs/app_prod.log
    when: "midnight" # ротация в полночь
    interval: 1 # интервал (в единицах when)
    backupCount: 7 # хранить 7 старых файлов

root:
  level: INFO
  handlers: [console, file] # теперь логи пишутся и в консоль, и в файл
